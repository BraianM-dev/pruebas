<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Proyecto AR - UTU</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <!-- Requerido por FBXLoader para descomprimir geometría -->
    <script src="https://cdn.jsdelivr.net/npm/zlibjs@0.3.1/bin/inflate.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
    
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@1.0.0/dist/aframe-look-at-component.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

<link rel="stylesheet" href="css/estilos.css">

</head>

<body style="margin:0; overflow:hidden;">

<div id="panel-info">

<h3>Proyecto AR</h3>

<p>Marcador:
<span id="marcador-id">Ninguno</span>
</p>

<p>Modelo:
<span id="modelo-id">-</span>
</p>

<p>Estado:
<span id="estado-id">Buscando...</span>
</p>

<p>FPS:
<span id="fps-id">0</span>
</p>

</div>


<a-scene

embedded

vr-mode-ui="enabled:false"

renderer="antialias:true"

arjs="
sourceType:webcam;
debugUIEnabled:true;
detectionMode:mono_and_matrix;
matrixCodeType:4x4_bch_13_9_5;
">

<a-assets>

<a-asset-item
id="dragon-glb"
src="modelos/dragon.glb">
</a-asset-item>

</a-assets>

<!-- Iluminación -->

<a-light
type="ambient"
intensity="0.8">
</a-light>

<a-light
type="directional"
intensity="1"
position="0 5 2">
</a-light>


<!-- ====================== -->
<!-- HIRO -->
<!-- ====================== -->

<a-marker
preset="hiro"
id="hiro">

<a-entity

gltf-model="#dragon-glb"

position="0 0 0"

rotation="0 0 0"

scale="0.4 0.4 0.4"

animation="property: rotation;
to:0 360 0;
loop:true;
dur:12000;
easing:linear">

</a-entity>

</a-marker>


<!-- ====================== -->
<!-- KANJI -->
<!-- ====================== -->

<a-marker
preset="kanji"
id="kanji">

<a-entity

fbx-model="src: url(modelos/dragon.fbx)"

position="0 0 0"

rotation="0 0 0"

scale="0.08 0.08 0.08"

animation="property: rotation;
to:0 360 0;
loop:true;
dur:12000;
easing:linear">

</a-entity>

</a-marker>


<!-- ====================== -->
<!-- MATRIZ 4x4 -->
<!-- ====================== -->

<a-marker
type="barcode"
value="0"
id="barcode0">

<a-entity

fbx-model="src: url(modelos/cofre.fbx)"

position="0 0 0"

rotation="0 0 0"

scale="0.02 0.02 0.02">

</a-entity>

</a-marker>



<a-entity camera></a-entity>

</a-scene>

<script src="js/utilidades.js"></script>
<script src="js/eventos.js"></script>

</body>
</html>
