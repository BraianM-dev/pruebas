<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyecto AR - UTU</title>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.7/aframe/build/aframe-ar.js"></script>
  <script src="https://unpkg.com/ar.js@3.4.7/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin:0; overflow:hidden; }
    #panel-info { position: absolute; top:10px; left:10px; background:rgba(0,0,0,0.7); color:white; padding:10px; border-radius:5px; z-index:10; font-family:sans-serif; }
  </style>
</head>
<body>
  <div id="panel-info">
    <h3>Proyecto AR</h3>
    <p>Marcador: <span id="marcador-id">Ninguno</span></p>
    <p>Estado: <span id="estado-id">Buscando...</span></p>
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled:false"
    renderer="antialias:true"
    arjs="sourceType:webcam; debugUIEnabled:true; detectionMode:mono; matrixCodeType:4x4_bch_13_9_5;"
  >
    <a-marker preset="hiro">
      <a-box color="red" scale="0.2 0.2 0.2"></a-box>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>

  <script>
    // Script para actualizar el panel (opcional)
    const scene = document.querySelector('a-scene');
    const markerIdSpan = document.getElementById('marcador-id');
    const estadoSpan = document.getElementById('estado-id');

    scene.addEventListener('markerFound', (e) => {
      markerIdSpan.textContent = e.target.id || 'desconocido';
      estadoSpan.textContent = 'Detectado';
    });
    scene.addEventListener('markerLost', (e) => {
      markerIdSpan.textContent = 'Ninguno';
      estadoSpan.textContent = 'Buscando...';
    });
  </script>
</body>
</html>
