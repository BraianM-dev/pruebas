<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR.js - Multi Marcador (Hiro, Kanji, Barcode 4x4 BCH)</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <!-- Requerido por FBXLoader para descomprimir geometría -->
    <script src="https://cdn.jsdelivr.net/npm/zlibjs@0.3.1/bin/inflate.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

    <!-- Nuestros propios archivos -->
    <link rel="stylesheet" href="css/estilos.css">
    <script src="js/utilidades.js" defer></script>
    <script src="js/eventos.js" defer></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- Panel de información en pantalla (lo maneja utilidades.js) -->
    <div id="panel-info">
        <h3>Panel AR</h3>
        <p>Marcador: <span id="marcador-id">Ninguno</span></p>
        <p>Modelo: <span id="modelo-id">-</span></p>
        <p>Estado: <span id="estado-id">Buscando...</span></p>
        <p>FPS: <span id="fps-id">0</span></p>
    </div>

    <a-scene
        embedded
        arjs="sourceType: webcam;
              debugUIEnabled: false;
              detectionMode: mono_and_matrix;
              matrixCodeType: 4x4_BCH_13_5_5;">

        <a-assets>
            <a-asset-item id="modelo-dragon-glb" src="modelos/dragon.glb"></a-asset-item>
            <a-asset-item id="modelo-mago-glb" src="modelos/mago.glb"></a-asset-item>
        </a-assets>

        <!-- Marcador de patrón: Hiro -->
        <a-marker preset="hiro" id="Hiro" registerevents>
            <a-entity
                gltf-model="#modelo-dragon-glb"
                position="0 0 0"
                scale="0.5 0.5 0.5"
                animation="property: rotation; to: 0 10 0; dur: 3000; easing: linear; loop: true">
            </a-entity>
        </a-marker>

        <!-- Marcador de patrón: Kanji -->
        <a-marker preset="kanji" id="Kanji" registerevents>
            <a-entity
                fbx-model="src: url(modelos/dragon.fbx)"
                position="0 0 0"
                scale="0.1 0.1 0.1"
                animation="property: rotation; to: 0 10 0; dur: 3000; easing: linear; loop: true">
            </a-entity>
        </a-marker>

        <!-- Marcador barcode 4x4 BCH 13,5,5, valor 0 -->
        <a-marker type="barcode" value="0" id="Barcode_0" registerevents>
            <a-entity
                gltf-model="#modelo-mago-glb"
                position="0 0 0"
                scale="0.5 0.5 0.5"
                animation-mixer>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
