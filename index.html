<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prueba AR - Marcador HIRO</title>

  <!-- ========== VERSIONES ESTABLES ========== -->
  <!-- A-Frame 1.2.0 (compatible con AR.js 3.x) -->
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>

  <!-- AR.js 3.4.6 (última estable en npm) -->
  <script src="https://unpkg.com/ar.js@3.4.6/aframe/build/aframe-ar.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    #panel-info {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 15px 20px;
      border-radius: 8px;
      z-index: 10;
      min-width: 200px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      pointer-events: none;
      user-select: none;
    }
    #panel-info h3 {
      margin: 0 0 8px 0;
      color: #4fc3f7;
    }
    #panel-info p {
      margin: 4px 0;
      font-size: 14px;
    }
    #panel-info span {
      font-weight: bold;
      color: #ffd54f;
    }
    .estado-detectado {
      color: #81c784 !important;
    }
    .estado-perdido {
      color: #ff8a80 !important;
    }
  </style>
</head>
<body>

  <!-- Panel de información -->
  <div id="panel-info">
    <h3>🧪 Prueba AR</h3>
    <p>Marcador: <span id="marcador-id">Ninguno</span></p>
    <p>Estado: <span id="estado-id" class="estado-perdido">Buscando...</span></p>
  </div>

  <!-- Escena AR -->
  <a-scene
    embedded
    vr-mode-ui="enabled:false"
    renderer="antialias:true"
    arjs="
      sourceType:webcam;
      debugUIEnabled:true;
      detectionMode:mono;
      matrixCodeType:4x4_bch_13_9_5;
      canvasSize:640;
    "
  >
    <!-- Iluminación básica -->
    <a-light type="ambient" intensity="0.8"></a-light>
    <a-light type="directional" intensity="1" position="0 5 2"></a-light>

    <!-- ==================== -->
    <!-- MARCADOR HIRO (patrón de referencia) -->
    <!-- ==================== -->
    <a-marker preset="hiro" id="hiro">
      <!-- Cubo rojo que gira -->
      <a-box
        color="red"
        scale="0.2 0.2 0.2"
        position="0 0.1 0"
        animation="property: rotation;
                   to: 0 360 0;
                   loop: true;
                   dur: 8000;
                   easing: linear"
      ></a-box>
    </a-marker>

    <!-- Cámara (obligatoria) -->
    <a-entity camera></a-entity>
  </a-scene>

  <!-- ========== SCRIPTS DE CONTROL ========== -->
  <script>
    (function() {
      const scene = document.querySelector('a-scene');
      const markerIdSpan = document.getElementById('marcador-id');
      const estadoSpan = document.getElementById('estado-id');

      // Actualizar panel cuando se encuentra un marcador
      scene.addEventListener('markerFound', (e) => {
        const marker = e.target;
        markerIdSpan.textContent = marker.id || 'desconocido';
        estadoSpan.textContent = '✅ Detectado';
        estadoSpan.className = 'estado-detectado';
      });

      // Actualizar panel cuando se pierde el marcador
      scene.addEventListener('markerLost', () => {
        markerIdSpan.textContent = 'Ninguno';
        estadoSpan.textContent = '🔍 Buscando...';
        estadoSpan.className = 'estado-perdido';
      });

      // Mensaje en consola cuando la escena está lista
      scene.addEventListener('loaded', () => {
        console.log('🔵 Escena AR cargada. Esperando marcador HIRO...');
      });

      // Capturar errores de la cámara
      scene.addEventListener('camera-error', (e) => {
        console.error('❌ Error de cámara:', e.detail);
        estadoSpan.textContent = '⚠️ Error cámara';
        estadoSpan.className = 'estado-perdido';
      });
    })();
  </script>

</body>
</html>
