<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR.js - Multi Marcador</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <!-- Requerido por FBXLoader para descomprimir geometría -->
    <script src="https://cdn.jsdelivr.net/npm/zlibjs@0.3.1/bin/inflate.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
        <a-assets>
            <a-asset-item id="fox" src="modelos/dragon.glb"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro">
            <a-entity 
                gltf-model="#fox"
                position="0 0 0"
                scale="0.5 0.5 0.5"
                animation="property: rotation; to: 0 10 0; dur: 3000; easing: linear; loop: true">
            </a-entity>
        </a-marker>

        <a-marker preset="kanji">
            <a-entity 
                fbx-model="src: url(modelos/cofre.fbx)"
                position="0 0 0"
                scale="0.1 0.1 0.1"
                animation="property: rotation; to: 0 10 0; dur: 3000; easing: linear; loop: true">
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
