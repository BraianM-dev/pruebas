<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyecto AR - UTU</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <!-- Requerido por FBXLoader para descomprimir geometría -->
    <script src="https://cdn.jsdelivr.net/npm/zlibjs@0.3.1/bin/inflate.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    #panel-info {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 15px 20px;
      border-radius: 8px;
      z-index: 10;
      min-width: 200px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.2);
      pointer-events: none;
      user-select: none;
    }
    #panel-info h3 {
      margin: 0 0 8px 0;
      color: #4fc3f7;
    }
    #panel-info p {
      margin: 4px 0;
      font-size: 14px;
    }
    #panel-info span {
      font-weight: bold;
      color: #ffd54f;
    }
    .estado-detectado {
      color: #81c784 !important;
    }
    .estado-perdido {
      color: #ff8a80 !important;
    }
  </style>
</head>
<body>

  <div id="panel-info">
    <h3>Proyecto AR</h3>
    <p>Marcador: <span id="marcador-id">Ninguno</span></p>
    <p>Modelo: <span id="modelo-id">-</span></p>
    <p>Estado: <span id="estado-id" class="estado-perdido">Buscando...</span></p>
    <p>FPS: <span id="fps-id">0</span></p>
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled:false"
    renderer="antialias:true"
    arjs="
      sourceType:webcam;
      debugUIEnabled:true;
      detectionMode:mono_and_matrix;
      matrixCodeType:4x4_bch_13_9_5;
      canvasSize:640;
    "
  >
    <!-- Iluminación -->
    <a-light type="ambient" intensity="0.8"></a-light>
    <a-light type="directional" intensity="1" position="0 5 2"></a-light>

    <!-- Assets -->
    <a-assets>
      <a-asset-item id="dragon-glb" src="modelos/dragon.glb"></a-asset-item>
    </a-assets>

    <!-- ====================== -->
    <!-- MARCADOR HIRO (GLB)   -->
    <!-- ====================== -->
    <a-marker preset="hiro" id="hiro">
      <a-entity
        gltf-model="#dragon-glb"
        position="0 0 0"
        scale="0.4 0.4 0.4"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear"
      ></a-entity>
    </a-marker>

    <!-- ====================== -->
    <!-- MARCADOR KANJI (FBX)  -->
    <!-- ====================== -->
    <a-marker preset="kanji" id="kanji">
      <a-entity
        fbx-model="src: url(modelos/dragon.fbx)"
        position="0 0 0"
        scale="0.08 0.08 0.08"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear"
      ></a-entity>
    </a-marker>

    <!-- ====================== -->
    <!-- CÓDIGO BARRAS 4x4 (0) -->
    <!-- ====================== -->
    <a-marker
      type="barcode"
      value="0"
      id="barcode0"
    >
      <a-entity
        fbx-model="src: url(modelos/cofre.fbx)"
        position="0 0 0"
        scale="0.02 0.02 0.02"
      ></a-entity>
    </a-marker>

    <!-- Cámara -->
    <a-entity camera></a-entity>
  </a-scene>

  <script>
    (function() {
      const scene = document.querySelector('a-scene');
      const marcadorSpan = document.getElementById('marcador-id');
      const modeloSpan = document.getElementById('modelo-id');
      const estadoSpan = document.getElementById('estado-id');
      const fpsSpan = document.getElementById('fps-id');

      // Mapeo de IDs a nombres de modelo (para mostrar)
      const modeloMap = {
        'hiro': 'Dragón (GLB)',
        'kanji': 'Dragón (FBX)',
        'barcode0': 'Cofre (FBX)'
      };

      // Actualizar panel cuando se encuentra un marcador
      scene.addEventListener('markerFound', (e) => {
        const marker = e.target;
        const id = marker.id;
        marcadorSpan.textContent = id || 'desconocido';
        modeloSpan.textContent = modeloMap[id] || '-';
        estadoSpan.textContent = '✅ Detectado';
        estadoSpan.className = 'estado-detectado';
      });

      // Actualizar cuando se pierde el marcador
      scene.addEventListener('markerLost', () => {
        marcadorSpan.textContent = 'Ninguno';
        modeloSpan.textContent = '-';
        estadoSpan.textContent = '🔍 Buscando...';
        estadoSpan.className = 'estado-perdido';
      });

      // Calcular FPS (aproximado)
      let frameCount = 0;
      let lastTime = performance.now();

      function updateFPS() {
        frameCount++;
        const now = performance.now();
        if (now - lastTime >= 1000) {
          fpsSpan.textContent = frameCount;
          frameCount = 0;
          lastTime = now;
        }
        requestAnimationFrame(updateFPS);
      }
      updateFPS();

      // Mensaje en consola
      scene.addEventListener('loaded', () => {
        console.log('🔵 Escena AR cargada. Esperando marcadores...');
      });

      scene.addEventListener('camera-error', (e) => {
        console.error('❌ Error de cámara:', e.detail);
        estadoSpan.textContent = '⚠️ Error cámara';
        estadoSpan.className = 'estado-perdido';
      });
    })();
  </script>

</body>
</html>
