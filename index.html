<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR.js - Multi Marcador (Hiro, Kanji, Barcode 4x4 BCH)</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <!-- Requerido por FBXLoader para descomprimir geometría -->
    <script src="https://cdn.jsdelivr.net/npm/zlibjs@0.3.1/bin/inflate.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
    <!-- Requerido para seguir la camara! -->
    <script src="https://unpkg.com/aframe-look-at-component@1.0.0/dist/aframe-look-at-component.min.js"></script>
    <!-- Requerido para que el gif funcione -->
    <script src="https://unpkg.com/aframe-gif-shader/dist/aframe-gif-shader.min.js"></script>
    <!-- Nuestros propios archivos -->
    <link rel="stylesheet" href="css/estilos.css">
    <!-- <script src="js/conexion.js" defer></script> -->
    <script src="js/utilidades.js" defer></script>
    <script src="js/eventos.js" defer></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- Panel de información en pantalla (lo maneja utilidades.js) -->
    <div id="panel-info">
        <h3>Panel AR</h3>
        <p>Marcador: <span id="marcador-id">Ninguno</span></p>
        <p>Modelo: <span id="modelo-id">-</span></p>
        <p>Estado: <span id="estado-id">Buscando...</span></p>
        <p>FPS: <span id="fps-id">0</span></p>
    </div>
    <!-- Panel para el texto del Dungeon Master -->
    <div id="panel-historia" style="position:fixed; bottom:0; left:0; right:0; max-height:30%; overflow-y:auto; background:rgba(0,0,0,0.7); color:#fff; padding:10px; font-family:sans-serif;"></div>
    
    <a-scene
        embedded
        arjs="sourceType: webcam;
              debugUIEnabled: false;
              detectionMode: mono_and_matrix;
              matrixCodeType: 4x4_BCH_13_5_5;">

        <a-assets>
            <a-asset-item id="modelo-dragon-glb" src="modelos/dragon.glb"></a-asset-item>
            <a-asset-item id="modelo-mago-glb" src="modelos/mago.glb"></a-asset-item>
            <a-asset-item id="modelo-model-glb" src="modelos/model.glb"></a-asset-item>
            <img id="imgDragon" src="modelos/demo.png">
            <video id="videoEjemplo" src="modelos/ejemplo.mp4" preload="auto" autoplay loop muted playsinline crossorigin="anonymous"></video>
            <video id="videoEjemplo2" src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4" autoplay loop muted playsinline crossorigin="anonymous"></video>
        </a-assets>

        <!-- Marcador de patrón: Hiro -->
        <a-marker preset="hiro" id="Hiro" registerevents>
            <a-entity
                gltf-model="#modelo-dragon-glb"
                position="0 0 0"
                scale="0.5 0.5 0.5"
                animation="property: rotation; to: 0 10 0; dur: 3000; easing: linear; loop: true">
            </a-entity>
        </a-marker>

        <!-- Marcador de patrón: Kanji -->
        <a-marker preset="kanji" id="Kanji" registerevents>
            <a-entity
                fbx-model="src: url(modelos/dragon.fbx)"
                position="0 0 0"
                scale="0.1 0.1 0.1"
                animation="property: rotation; to: 0 10 0; dur: 3000; easing: linear; loop: true">
            </a-entity>
        </a-marker>

        <!-- Marcador barcode 4x4 BCH 13,5,5, valor 0 -->
        <a-marker type="barcode" value="0" id="Barcode_0" registerevents>
            <a-entity
                gltf-model="#modelo-mago-glb"
                position="0 0 0"
                scale="0.5 0.5 0.5"
                animation-mixer>
            </a-entity>
            <a-plane
                position="0 1.2 -0.01"
                rotation="-90 0 0"
                width="2.8"
                height="0.5"
                color="black"
                opacity="0.7">
            </a-plane>
            <a-text
                value="Nombre: Mago\nNivel: 20\nVida: 350"
                position="0 1.3 0"
                rotation="-90 0 0"
                color="white"
                align="center"
                width="3">
            </a-text>
        </a-marker>
        
        <!-- Marcador barcode 4x4 BCH 13,5,5, valor 1 -->
        <a-marker type="barcode" value="1" id="Barcode_1" registerevents>
            <a-entity
                fbx-model="src: url(modelos/mago.fbx)"
                position="0 0 0"
                rotation="-90 0 0" 
                scale="0.01 0.01 0.01"
                animation-mixer="clip: *; loop: repeat">
            </a-entity>         
            <a-text
                value="Mago"
                position="0 1 0"
                look-at="[camera]"
                align="center"
                color="yellow"
                width="2">
            </a-text>  
        </a-marker>

        <!-- Marcador barcode 4x4 BCH 13,5,5, valor 2 -->
        <a-marker type="barcode" value="2" id="Barcode_2" registerevents>
            <a-entity
                gltf-model="#modelo-model-glb"
                position="0 0 0"
                rotation="-90 0 0" 
                scale="2 2 2" 
                animation-mixer>
            </a-entity>
        </a-marker>

        <!-- Marcador barcode 4x4 BCH 13,5,5, valor 3 -->
        <a-marker type="barcode" value="3" id="Barcode_3" registerevents>
            <a-plane
                material="shader:gif; src:url(modelos/fuego.gif)"
                position="0 0.5 0"
                rotation="-90 0 0" 
                width="1"
                height="1">
            </a-plane>
        </a-marker>
        <!-- Marcador barcode 4x4 BCH 13,5,5, valor 4 Imagen PNG -->
        <a-marker type="barcode" value="4" id="Barcode_4" registerevents>        
            <a-image
                src="#imgDragon"
                position="0 0.8 0"
                rotation="-90 0 0"
                width="1.5"
                height="1.5">
            </a-image>
        </a-marker>  
        <!-- Marcador barcode 4x4 BCH 13,5,5, valor 5 Video MP4 -->
        <a-marker type="barcode" value="5" id="Barcode_5" registerevents>
            <a-video
                src="#videoEjemplo"
                position="0 0.5 0"
                rotation="-90 0 0"
                width="2"
                height="1.2">
            </a-video>
        </a-marker>    
        <!-- Marcador barcode 4x4 BCH 13,5,5, valor 6 Video MP4 desde URL -->
        <a-marker type="barcode" value="6" id="Barcode_6" registerevents>
            <a-video
                src="#videoEjemplo2"
                position="0 0.5 0"
                rotation="-90 0 0"
                width="2"
                height="1.2">
            </a-video>
        </a-marker>
            <!-- Marcador barcode 4x4 BCH 13,5,5, valor 3 -->
<!--         <a-marker type="barcode" value="3" id="Barcode_3" registerevents>
            <a-entity
                id="objeto-Barcode_3"
                fbx-model="src: url(modelos/mago.fbx)"
                position="0 0 0"
                rotation="-90 0 0" 
                scale="0.01 0.01 0.01"
                visible="false"
                animation-mixer="clip: *; loop: repeat">
            </a-entity>
        </a-marker> -->
        
        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
